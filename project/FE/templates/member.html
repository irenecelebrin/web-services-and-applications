<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Member — Slackline Ireland</title>
    <link rel="stylesheet" href="/static/style.css" />
</head>
<body>

    <nav>
        <a class="brand" href="/">
            <img src="/gallery/slackline_ireland.jpeg" alt="Slackline Ireland" class="nav-logo" />
            Slackline Ireland
        </a>
        <form id="nav-search" class="nav-search">
            <input type="text" name="query" placeholder="Search by surname / email" />
            <button type="submit">Go</button>
        </form>
        <a href="/persons">Members</a>
        <a href="/form">Add Member</a>
    </nav>

    <main>
        <div id="content">Loading…</div>
    </main>

    <script>
        document.getElementById('nav-search').addEventListener('submit', e => {
            e.preventDefault();
            const query = e.target.query.value.trim();
            if (!query) return;
            const type = query.includes('@') ? 'email' : 'surname';
            window.location.href = `/persons/${type}/${encodeURIComponent(query)}`;
        });

        const id = window.location.pathname.split('/').pop();

        if (!id) {
            window.location.href = '/persons';
        } else {
            fetch(`/person/${id}`, { headers: { 'Accept': 'application/json' } })
                .then(res => {
                    if (!res.ok) throw new Error('Not found');
                    return res.json();
                })
                .then(m => {
                    document.title = `${m.name} ${m.last_name} — Slackline Ireland`;

                    const paymentAmount = m.payment_amount != null
                        ? '€' + Number(m.payment_amount).toFixed(2)
                        : '—';

                    document.getElementById('content').innerHTML = `
                        <h1>${m.name} ${m.last_name}</h1>

                        <div class="card">
                            <h2>Personal details</h2>
                            <dl>
                                <dt>ID</dt>            <dd>${m.id}</dd>
                                <dt>Email</dt>         <dd>${m.email || '—'}</dd>
                                <dt>Phone</dt>         <dd>${m.phone || '—'}</dd>
                                <dt>Address</dt>       <dd>${m.address || '—'}</dd>
                                <dt>Date of birth</dt> <dd>${m.date_of_birth || '—'}</dd>
                            </dl>
                        </div>

                        <div class="card">
                            <h2>Emergency contact</h2>
                            <dl>
                                <dt>Name</dt>  <dd>${m.emergency_contact_name || '—'}</dd>
                                <dt>Phone</dt> <dd>${m.emergency_contact_phone || '—'}</dd>
                            </dl>
                        </div>

                        <div class="card">
                            <h2>Membership</h2>
                            <dl>
                                <dt>Registered</dt>   <dd>${m.registration_date || '—'}</dd>
                                <dt>Payment date</dt> <dd>${m.payment_date || '—'}</dd>
                                <dt>Amount paid</dt>  <dd>${paymentAmount}</dd>
                            </dl>
                        </div>

                        <div class="btn-row">
                            <a class="btn btn-primary" href="/form?id=${m.id}">Edit</a>
                            <a class="btn btn-secondary" href="/persons">← All members</a>
                            <button class="btn btn-danger" id="delete-btn">Delete</button>
                        </div>`;

                    document.getElementById('delete-btn').addEventListener('click', () => {
                        if (!confirm(`Delete ${m.name} ${m.last_name}? This cannot be undone.`)) return;

                        fetch(`/person/${m.id}`, { method: 'DELETE' })
                            .then(res => {
                                if (!res.ok) throw new Error('Delete failed');
                                window.location.href = '/persons';
                            })
                            .catch(() => alert('Failed to delete member.'));
                    });
                })
                .catch(() => {
                    document.getElementById('content').innerHTML =
                        '<p class="alert alert-error">Member not found.</p>';
                });
        }
    </script>

</body>
</html>
