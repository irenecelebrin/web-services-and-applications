<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- page title: child templates can override the default -->
    <title>{% block title %}Slackline Ireland{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>

    <!-- Navigation bar -->
    <nav>
        <!-- Logo links back to the landing page -->
        <a class="brand" href="{{ url_for('index') }}">
            <img src="{{ url_for('gallery', filename='slackline_ireland.jpeg') }}"
                 alt="Slackline Ireland" class="nav-logo" />
            Slackline Ireland
        </a>
        <a href="{{ url_for('index') }}">Home</a>
        <a href="{{ url_for('get_all_persons') }}">Members</a>
        <a href="{{ url_for('new_member_form') }}">Add Member</a>
    </nav>

    <!-- Main page content — filled in by each child template -->
    <main>
        {% block content %}{% endblock %}
    </main>

</body>
</html>
