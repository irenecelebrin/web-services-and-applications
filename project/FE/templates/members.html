<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Members — Slackline Ireland</title>
    <link rel="stylesheet" href="/static/style.css" />
</head>
<body>

    <nav>
        <a class="brand" href="/">
            <img src="/gallery/slackline_ireland.jpeg" alt="Slackline Ireland" class="nav-logo" />
            Slackline Ireland
        </a>
        <form id="nav-search" class="nav-search">
            <input type="text" name="query" placeholder="Search by surname / email" />
            <button type="submit">Go</button>
        </form>
        <a href="/persons">Members</a>
        <a href="/form">Add Member</a>
    </nav>

    <main>
        <h1>Members</h1>
        <div id="content">Loading…</div>
    </main>

    <script>
        document.getElementById('nav-search').addEventListener('submit', e => {
            e.preventDefault();
            const query = e.target.query.value.trim();
            if (!query) return;
            const type = query.includes('@') ? 'email' : 'surname';
            window.location.href = `/persons/${type}/${encodeURIComponent(query)}`;
        });

        fetch(window.location.pathname, { headers: { 'Accept': 'application/json' } })
            .then(res => {
                if (!res.ok) throw new Error('Request failed');
                return res.json();
            })
            .then(members => {
                const el = document.getElementById('content');

                if (!members.length) {
                    el.innerHTML = `
                        <div class="empty-state">
                            <p>No members yet. <a href="/form">Add the first one.</a></p>
                        </div>`;
                    return;
                }

                const rows = members.map(m => `
                    <tr>
                        <td>${m.id}</td>
                        <td><a href="/person/${m.id}">${m.name} ${m.last_name}</a></td>
                        <td>${m.email || '—'}</td>
                        <td>${m.phone || '—'}</td>
                        <td>${m.registration_date || '—'}</td>
                    </tr>`).join('');

                el.innerHTML = `
                    <div class="table-wrapper">
                        <table>
                            <thead>
                                <tr>
                                    <th>#</th>
                                    <th>Name</th>
                                    <th>Email</th>
                                    <th>Phone</th>
                                    <th>Registered</th>
                                </tr>
                            </thead>
                            <tbody>${rows}</tbody>
                        </table>
                    </div>`;
            })
            .catch(() => {
                document.getElementById('content').innerHTML =
                    '<p class="alert alert-error">Failed to load members.</p>';
            });
    </script>

</body>
</html>
